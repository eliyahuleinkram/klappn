<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- the app's own canvas: deep near-black, a breath of violet in the corner -->
    <linearGradient id="tile" gradientUnits="userSpaceOnUse" x1="2" y1="2" x2="30" y2="30">
      <stop offset="0" stop-color="#190b20"/>
      <stop offset="0.55" stop-color="#0b070f"/>
      <stop offset="1" stop-color="#060708"/>
    </linearGradient>
    <!-- one restrained fuchsia bloom — the accent that carries the room -->
    <radialGradient id="bloom" cx="30%" cy="18%" r="85%">
      <stop offset="0" stop-color="#e0319c" stop-opacity="0.55"/>
      <stop offset="0.45" stop-color="#a855f7" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- brushed steel: bright crown settling to cool silver -->
    <linearGradient id="steel" gradientUnits="userSpaceOnUse" x1="10" y1="6" x2="22" y2="26">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#e9edf4"/>
      <stop offset="1" stop-color="#b4bdcc"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#tile)"/>
  <rect width="32" height="32" rx="7" fill="url(#bloom)"/>
  <!-- hairline accent edge — premium, not loud -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" fill="none" stroke="#e0319c" stroke-opacity="0.4"/>
  <!-- the K as a TRUE GLYPH (filled, like type): stem + two diagonals whose
       terminals are cut FLAT — shoulders level at cap height, feet level on the
       baseline — exactly like a typeset capital K. Neon rim beneath, steel on top. -->
  <path d="M9.8 7.5 H13.2 V24.5 H9.8 Z
           M19 7.5 H23.6 L16.2 16.2 H11.6 Z
           M11.6 15.8 H16.2 L24 24.5 H19.4 Z"
        fill="none" stroke="#e0319c" stroke-opacity="0.5" stroke-width="1.6" stroke-linejoin="miter"/>
  <path d="M9.8 7.5 H13.2 V24.5 H9.8 Z
           M19 7.5 H23.6 L16.2 16.2 H11.6 Z
           M11.6 15.8 H16.2 L24 24.5 H19.4 Z"
        fill="url(#steel)"/>
</svg>
